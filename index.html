<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Strict CSP. 'unsafe-inline' is intentionally allowed ONLY on style-src — Vite injects
      a few short inline stylesheets and react-grid-layout sets transform/width inline while
      dragging, both of which need it. Scripts stay strict (no inline, no eval). connect-src
      'self' lets updateCheck poll /version.json without opening the door to third parties.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';"
    />
    <title>Sect: Ascendant</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
